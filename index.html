        }

            border: 4px solid #f3f3f3; border-top: 4px solid #ffc107;
            border-radius: 50%; width: 30px; height: 30px;

    </style>

    window.onload = function() {
        const petSelect = document.getElementById('petugas');

    function updateKegiatan() {
        const pet = document.getElementById('petugas').value;
        const kegSelect = document.getElementById('kegiatan');
        kegSelect.innerHTML = '<option value="">-- Pilih Kegiatan --</option>';
        if (pet) mappingPetugas[pet].forEach(k => kegSelect.add(new Option(k, k)));

    function updateKomoditas() {
        const res = document.getElementById('responden').value;
        const komSelect = document.getElementById('komoditas');
        komSelect.innerHTML = '<option value="">-- Pilih Komoditas --</option>';

            const filteredKom = [...new Set(surveyData.filter(d => d.resp === res).map(d => d.kom))];
            filteredKom.forEach(k => komSelect.add(new Option(k, k)));
        }
    }

    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('image-preview');
                img.src = e.target.result;
                img.classList.remove('hidden');
                document.getElementById('placeholder-text').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }
    }

    // FUNGSI KOMPRESI FOTO (BIKIN KILAT)
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                    }, 'image/jpeg', 0.7);
                };
            };
        });
    }

    async function sendData() {
        const btn = document.getElementById('btn-kirim');
        const fileInput = document.getElementById('camera-input').files[0] || document.getElementById('file-input').files[0];

        if (!document.getElementById('petugas').value || !fileInput || !document.getElementById('kualitas').value) {
            alert('Lengkapi semua data dan foto ya Pak!'); return;
        }

        btn.disabled = true;
        btn.innerHTML = "⏳ MENGECILKAN FOTO...";

        try {
            const compressedFile = await compressImage(fileInput);
            btn.innerHTML = "⏳ MENGIRIM DATA...";

            const formData = new FormData();
            formData.append('image', compressedFile);
            const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=da686e0dd69fe24a739317f961163f1e`, { method: 'POST', body: formData });
            const imgData = await imgRes.json();
            
            // GANTI DENGAN URL APPS SCRIPT BAPAK
            const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9fhd6D_U4xfq1jlB_U4ZeJADsP5qj_kkL2xUZOKxXKT4ZnSKqHGaJO8sbz_jYhZz7MA/exec'; 

            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    data: [{
                        'waktu': new Date().toLocaleString('id-ID'),
                        'petugas': document.getElementById('petugas').value,
                        'kegiatan': document.getElementById('kegiatan').value,
                        'responden': document.getElementById('responden').value,
                        'komoditas': document.getElementById('komoditas').value,
                        'kualitas': document.getElementById('kualitas').value,
                        'produsen': document.getElementById('produsen').value,
                        'foto': imgData.data.url
                    }]
                })
            });

            alert("✅ BERHASIL! Data terkirim sangat cepat.");
            location.reload();
        } catch (e) { alert("Gagal: " + e.message); } finally { btn.disabled = false; btn.innerHTML = "🚀 Kirim Data"; }
    }
