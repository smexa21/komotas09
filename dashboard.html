<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Survei Harga - BPS Tabalong</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-container { overflow-x: auto; }
        /* Header Rata Kiri sejajar dengan isi */
        th { background-color: #0066b2; color: white; text-transform: uppercase; font-size: 9px; padding: 12px; text-align: left; }
        td { font-size: 11px; padding: 10px; border-bottom: 1px solid #edf2f7; text-align: left; }
        tr:nth-child(even) { background-color: #f8fafc; }
        
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#0066b2]"></div>
        <p class="mt-4 font-bold text-[#0066b2]">Memuat Data...</p>
    </div>

    <div class="bg-[#0066b2] text-white p-4 shadow-lg border-b-4 border-[#ffc107] sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="https://www.bps.go.id/_next/image?url=%2Fassets%2Flogo-bps.png&w=1080&q=75" class="h-8">
                <div>
                    <h1 class="font-bold text-sm uppercase leading-tight">Monitoring Survei</h1>
                    <p class="text-[9px] text-yellow-300 font-bold uppercase tracking-widest">BPS Kab. Tabalong</p>
                </div>
            </div>
            <button onclick="fetchData()" class="bg-[#ffc107] text-black text-[10px] font-bold px-3 py-2 rounded-lg hover:bg-yellow-400 transition-all">🔄 REFRESH</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto p-4">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Total Entri</p>
                <h3 id="stat-total" class="text-2xl font-black text-gray-800">0</h3>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-green-500">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Update Terakhir</p>
                <h3 id="stat-last" class="text-[10px] font-bold text-gray-800 mt-2">-</h3>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-md overflow-hidden border border-gray-200">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <input type="text" id="search" onkeyup="filterTable()" placeholder="Cari data petugas, responden, atau komoditas..." class="text-[10px] p-3 border rounded-xl outline-none focus:border-blue-500 w-full">
            </div>
            <div class="table-container">
                <table class="w-full" id="data-table">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Petugas</th>
                            <th>Responden</th>
                            <th>Komoditas</th>
                            <th>Kualitas</th>
                            <th>Produsen</th>
                            <th>Foto</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9fhd6D_U4xfq1jlB_U4ZeJADsP5qj_kkL2xUZOKxXKT4ZnSKqHGaJO8sbz_jYhZz7MA/exec';

        async function fetchData() {
            document.getElementById('loading-overlay').style.display = 'flex';
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const result = await response.json();
                if (result.status === 'success') {
                    renderTable(result.data);
                }
            } catch (error) {
                alert('Gagal mengambil data dari Google Sheets.');
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            // Urutkan data terbaru di paling atas
            const sortedData = [...data].reverse();

            sortedData.forEach(row => {
                const tr = document.createElement('tr');
                
                tr.innerHTML = `
                    <td class="whitespace-nowrap">${row.waktu || '-'}</td>
                    <td class="font-bold text-gray-700">${row.petugas || '-'}</td>
                    <td>${row.responden || '-'}</td>
                    <td class="text-blue-700 font-bold">${row.komoditas || '-'}</td>
                    <td class="text-gray-600 italic">${row.kualitas || '-'}</td>
                    <td>${row.produsen || '-'}</td>
                    <td>
                        <a href="${row.foto}" target="_blank" class="bg-blue-100 text-blue-600 px-3 py-1.5 rounded-lg font-bold text-[10px] hover:bg-blue-600 hover:text-white transition-all">LIHAT</a>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('stat-total').innerText = sortedData.length;
            if(sortedData.length > 0) document.getElementById('stat-last').innerText = sortedData[0].waktu;
        }

        function filterTable() {
            const input = document.getElementById("search");
            const filter = input.value.toUpperCase();
            const tr = document.getElementById("table-body").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                tr[i].style.display = tr[i].textContent.toUpperCase().includes(filter) ? "" : "none";
            }
        }

        fetchData();
    </script>
</body>
</html>
