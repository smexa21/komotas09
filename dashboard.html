<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Survei Harga - BPS Tabalong</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Gaya agar scroll tabel halus di HP */
        .table-container { overflow-x: auto; }
        th { background-color: #0066b2; color: white; text-transform: uppercase; font-size: 10px; padding: 12px; }
        td { font-size: 11px; padding: 10px; border-bottom: 1px solid #edf2f7; }
        tr:nth-child(even) { background-color: #f8fafc; }
        
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#0066b2]"></div>
        <p class="mt-4 font-bold text-[#0066b2]">Menarik Data dari Sheets...</p>
    </div>

    <div class="bg-[#0066b2] text-white p-4 shadow-lg border-b-4 border-[#ffc107] sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="https://www.bps.go.id/_next/image?url=%2Fassets%2Flogo-bps.png&w=1080&q=75" class="h-8">
                <div>
                    <h1 class="font-bold text-sm uppercase leading-tight">Monitoring Survei</h1>
                    <p class="text-[9px] text-yellow-300 font-bold uppercase tracking-widest">BPS Kab. Tabalong</p>
                </div>
            </div>
            <button onclick="fetchData()" class="bg-[#ffc107] text-black text-[10px] font-bold px-3 py-2 rounded-lg hover:bg-yellow-400 transition-all">🔄 REFRESH</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Total Entri</p>
                <h3 id="stat-total" class="text-2xl font-black text-gray-800">0</h3>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-green-500">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Update Terakhir</p>
                <h3 id="stat-last" class="text-xs font-bold text-gray-800 mt-2">-</h3>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-md overflow-hidden border border-gray-200">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h2 class="font-black text-xs uppercase text-gray-600">Data Hasil Survei Terkini</h2>
                <input type="text" id="search" onkeyup="filterTable()" placeholder="Cari Nama/Komoditas..." class="text-[10px] p-2 border rounded-lg outline-none focus:border-blue-500 w-1/2">
            </div>
            <div class="table-container">
                <table class="w-full" id="data-table">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Petugas</th>
                            <th>Responden</th>
                            <th>Komoditas</th>
                            <th>Produsen</th>
                            <th>Foto</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // GANTI INI DENGAN URL APPS SCRIPT BAPAK
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYvP832S_mU01PY7klohIuCGEXhMl8Ej_LWDcrVSilVAyM5-_Y-2PQeA9vSkjOISgE/exec';

        async function fetchData() {
            document.getElementById('loading-overlay').style.display = 'flex';
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const result = await response.json();
                
                if (result.status === 'success') {
                    renderTable(result.data);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Gagal mengambil data. Pastikan Apps Script sudah di-Deploy ulang (New Version).');
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            // Urutkan data terbaru di atas
            const sortedData = data.reverse();

            sortedData.forEach(row => {
                const tr = document.createElement('tr');
                
                // Perbaikan pembacaan kolom agar tidak undefined
                // Kita gabungkan kolom 'komoditas' dan 'kualitas' dari Sheets
                const infoKomoditas = `${row.komoditas || ''} - ${row.kualitas || ''}`;
                
                tr.innerHTML = `
                    <td class="whitespace-nowrap">${row.waktu || '-'}</td>
                    <td class="font-bold">${row.petugas || '-'}</td>
                    <td>${row.responden || '-'}</td>
                    <td class="text-blue-600 font-bold">${infoKomoditas}</td>
                    <td>${row.produsen || '-'}</td>
                    <td>
                        <a href="${row.foto}" target="_blank" class="bg-blue-100 text-blue-600 px-2 py-1 rounded font-bold text-[9px] hover:bg-blue-200">LIHAT</a>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('stat-total').innerText = sortedData.length;
            if(sortedData.length > 0) {
                document.getElementById('stat-last').innerText = sortedData[0].waktu;
            }
        }

        function filterTable() {
            const input = document.getElementById("search");
            const filter = input.value.toUpperCase();
            const table = document.getElementById("data-table");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let found = false;
                const tds = tr[i].getElementsByTagName("td");
                for(let j = 0; j < tds.length; j++) {
                    if (tds[j].textContent.toUpperCase().indexOf(filter) > -1) {
                        found = true;
                    }
                }
                tr[i].style.display = found ? "" : "none";
            }
        }

        fetchData();
    </script>
</body>
</html>
